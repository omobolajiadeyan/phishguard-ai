name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag version $tag_version does not match package version $package_version" >&2
            exit 1
          fi

      - name: Build and validate distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
          sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS

      - name: Verify wheel installation
        run: |
          python -m pip install --force-reinstall dist/*.whl
          cd /tmp
          phishguard --help
          phishguard url "https://example.com"

      - name: Attest release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --generate-notes \
              --title "PhishGuard AI $GITHUB_REF_NAME"
          fi
