name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Reject unsafe repository content
        run: python tools/repository_policy.py

  marketplace-action:
    name: Marketplace action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run the repository action
        id: phishguard
        uses: ./
        with:
          url: https://example.com
          sarif-output: phishguard-action-results.sarif
          fail-on-phishing: "false"
      - name: Validate action output
        env:
          SARIF_PATH: ${{ steps.phishguard.outputs.sarif-path }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["SARIF_PATH"])
          data = json.loads(path.read_text(encoding="utf-8"))
          assert data["version"] == "2.1.0"
          assert data["runs"], "SARIF output must contain at least one run"
          PY

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project
        run: python -m pip install .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Verify installed command
        run: |
          phishguard --help
          phishguard url "https://example.com"

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Build distributions
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Verify wheel installation
        run: |
          python -m pip install --force-reinstall dist/*.whl
          cd /tmp
          phishguard --help
          phishguard url "https://example.com"
