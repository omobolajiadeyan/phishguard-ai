name: PhishGuard Self-Scan

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  self-scan:
    name: Scan repository URLs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install PhishGuard AI
        run: python -m pip install .

      - name: Scan repository URLs
        run: |
          phishguard batch data/urls.txt \
            --output phishguard-results.sarif \
            --format sarif \
            --plain

      - name: Validate SARIF output
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          sarif = json.loads(Path("phishguard-results.sarif").read_text(encoding="utf-8"))
          assert sarif["version"] == "2.1.0"
          assert sarif["runs"], "SARIF output must contain at least one run"
          PY

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          sarif_file: phishguard-results.sarif
          category: phishguard-ai
